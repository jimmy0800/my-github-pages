---
layout: default
---
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

    <header class="site-header">
        <div class="container">
            <h1>{{ site.title }}</h1>
            <p class="site-description">{{ site.description }}</p>
        </div>
    </header>

    <main class="container">
        <h2 class="section-title">專案列表</h2>
        
        <div class="card-grid">
            {% for post in site.posts %}
            <article class="card">
                <div class="card-image" style="background-image: url('{{ post.thumbnail }}');"></div>
                <div class="card-content">
                    <span class="post-date">{{ post.date | date: "%Y-%m-%d" }}</span>
                    <h3>{{ post.title }}</h3>
                    <p>{{ post.description }}</p>
                    <a href="{{ post.url | relative_url }}" class="btn-primary">閱讀更多</a>
                </div>
            </article>
            {% endfor %}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. Built with Jekyll.</p>
        </div>
    </footer>

</body>
</html>
