---
layout: default
---
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>我的作品集</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

    <div class="container">
        <h1 style="text-align: center;">專案列表</h1>
        
        <div class="card-grid">
            {% for post in site.posts %}
            <div class="card">
                <div class="card-image" style="background-image: url('{{ post.thumbnail }}');"></div>
                <div class="card-content">
                    <h3>{{ post.title }}</h3>
                    <p>{{ post.description }}</p>
                    <a href="{{ post.url | relative_url }}" class="btn">閱讀更多</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
