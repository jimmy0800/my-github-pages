title: 我的作品集
description: 這是一個自動化生成的卡片式作品集
baseurl: "/my-github-pages" # 設定為專案名稱以確保資源路徑正確
url: "https://jimmy0800.github.io"
markdown: kramdown
# 移除 theme 以使用完全自定義的佈局
plugins:
  - jekyll-feed
  - jekyll-seo-tag
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
