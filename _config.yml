title: 個人實用工具箱
description: 存放各類 Web 小工具、實驗性程式碼以及個人生活應用程式的倉庫
baseurl: "/my-github-pages" # 設定為專案名稱以確保資源路徑正確
url: "https://jimmy0800.github.io"
markdown: kramdown
# 移除 theme 以使用完全自定義的佈局
plugins:
  - jekyll-feed
  - jekyll-seo-tag
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
